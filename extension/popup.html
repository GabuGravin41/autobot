<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autobot</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="white" width="18" height="18">
                <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7H3a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2M7.5 13a.5.5 0 0 0-.5.5.5.5 0 0 0 .5.5.5.5 0 0 0 .5-.5.5.5 0 0 0-.5-.5m9 0a.5.5 0 0 0-.5.5.5.5 0 0 0 .5.5.5.5 0 0 0 .5-.5.5.5 0 0 0-.5-.5M3 21v-1a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4v1H3Z"/>
            </svg>
        </div>
        <div>
            <span class="title">Autobot</span>
            <span class="subtitle">Local AI Agent</span>
        </div>
        <div id="status-dot" class="dot" title="Connection status"></div>
    </div>

    <!-- Live screenshot -->
    <div id="screenshot-wrap">
        <img id="screenshot" src="" alt="Screen" />
        <div id="screenshot-placeholder">No screenshot yet</div>
    </div>

    <!-- Run status bar -->
    <div class="status-bar">
        <span id="run-badge" class="badge badge-idle">IDLE</span>
        <span id="step-info" class="step-info"></span>
        <span id="model-info" class="model-info"></span>
    </div>

    <!-- Agent narrative -->
    <div id="narrative-box" class="narrative" style="display:none"></div>

    <!-- Current goal -->
    <div id="goal-box" class="goal" style="display:none"></div>

    <!-- Approval request -->
    <div id="approval-box" class="approval-box" style="display:none">
        <div class="approval-label">⚠️ Agent needs approval</div>
        <div id="approval-msg" class="approval-msg"></div>
        <div class="approval-btns">
            <button id="allow-btn" class="btn-allow">Allow</button>
            <button id="block-btn" class="btn-block">Block</button>
        </div>
    </div>

    <!-- Run controls -->
    <div id="controls" class="controls" style="display:none">
        <button id="abort-btn" class="btn-abort">Abort Run</button>
        <a id="dashboard-link" class="btn-dash" target="_blank">Open Dashboard</a>
    </div>

    <!-- Settings row -->
    <details class="settings-details">
        <summary>Settings</summary>
        <label>Backend URL</label>
        <input id="server-url" type="url" placeholder="http://127.0.0.1:8000" />
        <button id="save-btn" class="btn-save">Save</button>
        <p id="saved-msg" class="saved-msg"></p>
    </details>

    <script src="popup.js"></script>
</body>
</html>
