version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: autobot-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ~/.autobot:/root/.autobot   # persist memory + run logs across restarts
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - AUTOBOT_CORS_ALLOW_ALL=1    # needed so frontend container can reach backend
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use the backend service name for inter-container communication.
        # Browser clients reach the backend through the host (localhost:8000),
        # so we set this to empty and let the frontend proxy via the host port.
        VITE_API_URL: ""
    container_name: autobot-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
